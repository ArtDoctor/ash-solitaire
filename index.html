<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solitaire</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <!-- ═══════════════════════════════════════════════════════ HOME SCREEN -->
    <div id="screen-home" class="screen">
      <div class="shell-top">
        <button
          type="button"
          id="btn-close-app"
          class="btn-close-app"
          title="Close"
          aria-label="Close application"
        >
          ×
        </button>
      </div>
      <div class="home-content">
        <div class="home-logo">
          <span class="suit-icon suit-spades">♠</span>
          <span class="suit-icon suit-hearts">♥</span>
          <span class="suit-icon suit-diamonds">♦</span>
          <span class="suit-icon suit-clubs">♣</span>
        </div>
        <h1 class="home-title">Solitaire</h1>
        <p class="home-subtitle">Klondike · Draw Three · Single Pass</p>
        <button id="btn-play" class="btn-primary">Play</button>
        <button id="btn-settings" type="button" class="btn-secondary">Settings</button>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════ SETTINGS -->
    <div id="screen-settings" class="screen">
      <div class="settings-panel">
        <h2 class="settings-title">Settings</h2>
        <label class="settings-row">
          <input type="checkbox" id="setting-game-fullscreen" checked />
          <span>Borderless fullscreen</span>
        </label>
        <p class="settings-hint">
          When off, the app uses a normal window. When on, the window is borderless fullscreen.
        </p>
        <label class="settings-row">
          <input type="checkbox" id="setting-no-drag-ghost-clones" />
          <span>Hide floating card copies while dragging</span>
        </label>
        <p class="settings-hint">
          When on, only the dimmed cards in the layout are shown during a drag — no duplicate stack
          follows the pointer.
        </p>
        <button id="btn-settings-back" type="button" class="btn-primary">Back</button>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════ GAME SCREEN -->
    <div id="screen-game" class="screen">

      <!-- Header bar -->
      <header class="game-header">
        <button id="btn-menu" class="btn-control" title="Main Menu">
          <span class="icon">☰</span>
          <span class="label">Menu</span>
        </button>

        <span class="header-title">Solitaire</span>

        <div class="header-right">
          <div class="win-display">
            <span class="win-label">Wins</span>
            <span id="win-count" class="win-number">0</span>
          </div>
          <button id="btn-restart" class="btn-control" title="Restart">
            <span class="icon">↺</span>
            <span class="label">Restart</span>
          </button>
        </div>
      </header>

      <!-- Main game area -->
      <div class="game-area">

        <!-- Left column: four foundations -->
        <aside class="foundations-col">
          <div class="card-slot foundation" id="foundation-0" data-suit="♠" title="Spades foundation"></div>
          <div class="card-slot foundation" id="foundation-1" data-suit="♥" title="Hearts foundation"></div>
          <div class="card-slot foundation" id="foundation-2" data-suit="♦" title="Diamonds foundation"></div>
          <div class="card-slot foundation" id="foundation-3" data-suit="♣" title="Clubs foundation"></div>
        </aside>

        <!-- Right: stock/waste row + tableau -->
        <main class="play-area">

          <!-- Stock / waste row -->
          <div class="stock-row">
            <div class="card-slot stock-slot" id="stock" title="Stock pile"></div>
            <div class="card-slot waste-slot" id="waste" title="Waste pile"></div>
          </div>

          <!-- Seven tableau columns -->
          <div class="tableau" id="tableau">
            <div class="tableau-col" id="tableau-0"></div>
            <div class="tableau-col" id="tableau-1"></div>
            <div class="tableau-col" id="tableau-2"></div>
            <div class="tableau-col" id="tableau-3"></div>
            <div class="tableau-col" id="tableau-4"></div>
            <div class="tableau-col" id="tableau-5"></div>
            <div class="tableau-col" id="tableau-6"></div>
          </div>

        </main>
      </div><!-- .game-area -->
    </div><!-- #screen-game -->

  </body>
</html>
